Module: web/templates/login.html
Purpose: Authentication page for the main dashboard of ScAnRoIdS.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanRoids | Operator Login</title>
    <!-- POINT TO LOCAL BOOTSTRAP -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-img { width: 100%; max-width: 350px; display: block; margin: 0 auto 1.5rem; border: 1px solid #444; }
    
        /* Alignment Logic */
        .input-group-row { display: flex; align-items: center; margin-bottom: 1rem; }
        .input-group-row label { width: 100px; text-align: left; margin-bottom: 0; font-size: 0.85rem; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .input-group-row input { flex: 1; background-color: #262626; border: 1px solid #444; color: #fff; padding: 0.4rem 0.7rem; border-radius: 4px; }
    
        .btn-authenticate { background-color: #660066; color: white; border: none; padding: 0.6rem 2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; width: 100%; margin-top: 1rem; }
        .btn-authenticate:hover { background-color: #800080; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="{{ url_for('static', filename='img/login_hero.jpg') }}" alt="ScanRoids" class="hero-img">
        <h5 class="mb-4 text-uppercase" style="letter-spacing: 2px;">Red Team Orchestrator</h5>
    
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group-row">
                <label>Username</label>
                <input type="text" name="username" placeholder="who dis?" required>
            </div>
            <div class="input-group-row">
                <label>Password</label>
                <input type="password" name="password" placeholder="Session Key" required>
            </div>
            <button type="submit" class="btn-authenticate">Authenticate</button>
        </form>
        <p class="mt-4 small text-muted">Authorized Personnel Only</p>
    </div>
</body>
</html>
